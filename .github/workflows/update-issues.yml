name: Actualizar Issues con Historial

on:
  push:
    branches:
      - copilot/update-issues-history
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  update-issues:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Issue #1 - Modelo Producto
      # ---------------------------------------------------------------
      - name: Comentar Issue 1 - Modelo Producto
        run: |
          gh issue comment 1 --repo "$REPO" --body "## Implementacion completada

          Se crearon **dos versiones** del modelo Producto en el proyecto:

          ### \`modelos/producto.py\` (version principal usada en \`principal.py\`)
          - Clase \`Producto\` con atributos \`nombre\`, \`cantidad\` y \`precio\` (precio por defecto = 0.0).
          - Metodo \`__init__(self, nombre, cantidad, precio=0.0)\` con comentarios didacticos.
          - Metodo \`to_dict(self)\` convierte el producto a diccionario para serializacion JSON.
          - Metodo \`convertir_a_texto(self)\` retorna representacion legible para el usuario.

          ### \`models/producto.py\` (version de referencia / segunda iteracion)
          - Misma clase \`Producto\` con atributos \`nombre\`, \`cantidad\` y \`precio\`.
          - Metodo \`__init__\` con docstring en formato Args.
          - Metodo \`to_dict\` para serializacion JSON.
          - Metodo \`__str__\` para representacion en texto.

          ### Notas
          - Se agrego el atributo \`precio\` (no estaba en la especificacion original pero era necesario para calcular totales en ventas).
          - \`from_dict\` no se implemento como metodo de clase; la reconstruccion se hace directamente en los servicios."

      - name: Cerrar Issue 1
        run: |
          gh issue close 1 --repo "$REPO" --comment "Issue cerrado. Funcionalidad implementada y en produccion."

      # ---------------------------------------------------------------
      # Issue #2 - Modelo Inventario
      # ---------------------------------------------------------------
      - name: Comentar Issue 2 - Modelo Inventario
        run: |
          gh issue comment 2 --repo "$REPO" --body "## Implementacion completada

          Se crearon **dos versiones** del modelo Inventario en el proyecto:

          ### \`modelos/inventario.py\` (version principal usada en \`principal.py\`)
          - Clase \`Inventario\` con diccionario interno \`self.productos\` (clave: nombre del producto, valor: objeto \`Producto\`).
          - Metodo \`agregar_producto(producto)\` agrega un producto al diccionario.
          - Metodo \`buscar_producto(nombre)\` retorna el objeto \`Producto\` o \`None\`.
          - Metodo \`listar_productos()\` retorna lista con todos los productos.

          ### \`models/inventario.py\` (version de referencia / segunda iteracion)
          - Misma estructura con diccionario como almacen interno.
          - Importa \`Producto\` desde \`models.producto\`.
          - Mismos tres metodos: \`agregar_producto\`, \`buscar_producto\`, \`listar_productos\`.

          ### Notas
          - Se uso un **diccionario** como estructura interna para busqueda O(1) por nombre.
          - Los metodos \`actualizar_stock\` y \`obtener_bajo_stock\` se implementaron a nivel de **ServicioInventario**, siguiendo el patron de capas de la arquitectura del proyecto."

      - name: Cerrar Issue 2
        run: |
          gh issue close 2 --repo "$REPO" --comment "Issue cerrado. Funcionalidad implementada y en produccion."

      # ---------------------------------------------------------------
      # Issue #3 - Repositorio JSON
      # ---------------------------------------------------------------
      - name: Comentar Issue 3 - Repositorio JSON
        run: |
          gh issue comment 3 --repo "$REPO" --body "## Implementacion completada

          Se implemento la capa de persistencia en \`utils/archivos.py\` como funciones utilitarias.

          ### \`utils/archivos.py\` (version principal)
          - Funcion \`cargar_datos(ruta_archivo)\`:
            - Verifica si el archivo existe con \`os.path.exists()\`.
            - Si no existe, retorna lista vacia \`[]\`.
            - Intenta leer y parsear JSON; ante cualquier error retorna \`[]\`.
          - Funcion \`guardar_datos(ruta_archivo, datos)\`:
            - Crea la carpeta automaticamente si no existe (\`os.makedirs\`).
            - Escribe el JSON con indentacion de 4 espacios para legibilidad.
            - Usa encoding UTF-8.

          ### Dependencias usadas
          - \`json\` (libreria estandar de Python)
          - \`os\` (libreria estandar de Python)

          ### Notas
          - Se opto por **funciones sueltas** en lugar de clase \`JsonRepository\` para simplificar el uso en todo el proyecto.
          - La funcion \`cargar_datos\` siempre retorna una lista vacia en caso de error, lo que garantiza compatibilidad con el bucle de inicializacion del inventario."

      - name: Cerrar Issue 3
        run: |
          gh issue close 3 --repo "$REPO" --comment "Issue cerrado. Funcionalidad implementada y en produccion."

      # ---------------------------------------------------------------
      # Issue #4 - Servicio de Inventario
      # ---------------------------------------------------------------
      - name: Comentar Issue 4 - Servicio de Inventario
        run: |
          gh issue comment 4 --repo "$REPO" --body "## Implementacion completada

          Se crearon **dos versiones** del servicio de inventario:

          ### \`servicios/servicio_inventario.py\` (version principal, usada en \`principal.py\`)
          Clase \`ServicioInventario\`:
          - \`__init__\`: crea instancia de \`Inventario\` y llama a \`cargar_inventario()\` al iniciar.
          - \`cargar_inventario()\`: lee el JSON y reconstruye objetos \`Producto\` en memoria.
          - \`guardar_inventario()\`: serializa todos los productos a dict y escribe el JSON.
          - \`agregar_producto(nombre, cantidad, precio)\`: valida que no exista, crea \`Producto\`, guarda.
          - \`buscar_producto(nombre)\`: delega a \`Inventario.buscar_producto()\`.
          - \`actualizar_stock(nombre, cantidad)\`: busca producto, actualiza cantidad, guarda.
          - \`listar_productos()\`: imprime todos los productos usando \`convertir_a_texto()\`.

          ### \`services/inventario_service.py\` (version de referencia / segunda iteracion)
          Clase \`InventarioService\` con los mismos metodos CRUD.

          ### Validaciones implementadas
          - Producto ya existente al agregar.
          - Producto no encontrado al actualizar stock.
          - Stock minimo configurado en \`configuracion.py\` (STOCK_MINIMO = 5).

          ### Archivos de configuracion
          - \`configuracion.py\`: define \`RUTA_ARCHIVO\`, \`RUTA_VENTAS\` y \`STOCK_MINIMO\`."

      - name: Cerrar Issue 4
        run: |
          gh issue close 4 --repo "$REPO" --comment "Issue cerrado. Funcionalidad implementada y en produccion."

      # ---------------------------------------------------------------
      # Issue #5 - Servicio de Ventas
      # ---------------------------------------------------------------
      - name: Comentar Issue 5 - Servicio de Ventas
        run: |
          gh issue comment 5 --repo "$REPO" --body "## Implementacion completada

          Se crearon **dos versiones** del servicio de ventas:

          ### \`servicios/servicio_ventas.py\` (version principal, usada en \`principal.py\`)
          Clase \`ServicioVentas\`:
          - \`__init__(servicio_inventario)\`: recibe y guarda referencia al \`ServicioInventario\`.
          - \`_cargar_ventas()\`: metodo privado para leer historial de ventas desde JSON.
          - \`_guardar_ventas(ventas)\`: metodo privado para escribir historial en JSON.
          - \`realizar_venta(nombre_producto, cantidad)\`:
            - Verifica existencia del producto en inventario.
            - Valida que cantidad sea mayor a 0.
            - Verifica stock suficiente.
            - Genera ID autoincremental.
            - Registra fecha y hora con \`datetime.now()\`.
            - Calcula total como cantidad multiplicado por precio.
            - Descuenta stock del inventario.
            - Guarda venta en historial JSON.
          - \`listar_ventas()\`: imprime todas las ventas con ID, fecha, producto, cantidad y total.
          - \`buscar_venta(id_venta)\`: busca una venta especifica por ID.
          - \`eliminar_venta(id_venta)\`: elimina la venta y devuelve el stock al inventario.
          - \`actualizar_venta(id_venta, nueva_cantidad)\`: ajusta cantidad y stock.

          ### \`services/venta_service.py\` (version de referencia / segunda iteracion)
          Clase \`VentaService\` con los mismos metodos CRUD de ventas.

          ### Validaciones implementadas
          - Producto no existe => mensaje de error.
          - Cantidad menor o igual a 0 => mensaje de error.
          - Stock insuficiente => mensaje de error con stock disponible.
          - Al actualizar venta: verifica si hay stock extra disponible para aumentar cantidad.
          - Al eliminar venta: restaura el stock en el inventario."

      - name: Cerrar Issue 5
        run: |
          gh issue close 5 --repo "$REPO" --comment "Issue cerrado. Funcionalidad implementada y en produccion."

      # ---------------------------------------------------------------
      # Issue #6 - Interfaz / Menu
      # ---------------------------------------------------------------
      - name: Comentar Issue 6 - Interfaz / Menu
        run: |
          gh issue comment 6 --repo "$REPO" --body "## Implementacion completada

          ### \`interfaz/menu.py\`
          Se implemento la interfaz de usuario completa con menus anidados:

          #### Menu Principal - \`mostrar_menu(servicio_inventario, servicio_ventas)\`
          - Opcion 1: Gestion de Inventario (submenu)
          - Opcion 2: Gestion de Ventas (submenu)
          - Opcion 3: Salir (usa \`sys.exit()\` para cierre limpio)

          #### Submenu Inventario - \`mostrar_menu_inventario(servicio_inventario)\`
          - Opcion 1: Agregar producto (pide nombre, cantidad y precio)
          - Opcion 2: Buscar producto (pide nombre y muestra resultado)
          - Opcion 3: Actualizar stock (pide nombre y nueva cantidad)
          - Opcion 4: Listar productos (muestra todos los productos)
          - Opcion 5: Volver al menu principal

          #### Submenu Ventas - \`mostrar_menu_ventas(servicio_ventas)\`
          - Opcion 1: Registrar nueva venta (pide producto y cantidad)
          - Opcion 2: Listar historial de ventas
          - Opcion 3: Editar venta (pide ID y nueva cantidad)
          - Opcion 4: Eliminar venta (pide ID)
          - Opcion 5: Volver al menu principal

          #### Validaciones de entrada
          - Captura \`ValueError\` en todas las conversiones numericas (\`int\`, \`float\`).
          - Muestra mensaje de error descriptivo sin crashear el programa.
          - Ciclo \`while True\` garantiza que el menu se muestre hasta que el usuario salga.

          ### \`principal.py\`
          Punto de entrada del programa:
          1. Crea \`ServicioInventario\` (carga datos desde JSON automaticamente).
          2. Crea \`ServicioVentas\` (recibe referencia al inventario).
          3. Llama a \`mostrar_menu()\` para iniciar la interfaz.

          ### Para ejecutar el programa
          \`\`\`bash
          python3 principal.py
          \`\`\`"

      - name: Cerrar Issue 6
        run: |
          gh issue close 6 --repo "$REPO" --comment "Issue cerrado. Funcionalidad implementada y en produccion."
