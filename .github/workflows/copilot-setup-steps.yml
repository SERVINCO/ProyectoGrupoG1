# Configuración de permisos para el agente GitHub Copilot.
# Este archivo le otorga al GITHUB_TOKEN los permisos de escritura necesarios
# para que el agente pueda comentar en issues y pull requests.
#
# ALTERNATIVA sin workflow: ve a
#   Settings → Actions → General → Workflow permissions
#   y selecciona "Read and write permissions".

name: Copilot Setup Steps

on:
  workflow_dispatch:

# Permisos explícitos de escritura para el GITHUB_TOKEN
permissions:
  contents: write        # leer y escribir código en el repositorio
  issues: write          # crear y editar comentarios en issues
  pull-requests: write   # crear y editar comentarios en pull requests

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
